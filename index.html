<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Alberta — wróć do domu</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fdf6ec;
    color: #2b2b2b;
    display: flex;
    justify-content: center;
    padding: 16px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .photo {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
  }
  .content {
    padding: 20px;
  }
  h1 {
    font-size: 1.6rem;
    margin-bottom: 4px;
  }
  .subtitle {
    color: #777;
    margin-bottom: 16px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
  }
  td {
    padding: 6px 0;
    border-bottom: 1px solid #eee;
    font-size: 1rem;
  }
  td.label {
    color: #777;
    width: 40%;
  }
  .call-buttons {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  a.call {
    display: block;
    text-align: center;
    background: #d9534f;
    color: #fff;
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: 600;
    padding: 14px;
    border-radius: 10px;
  }
  a.call:active {
    background: #c9302c;
  }
  .note {
    margin-top: 16px;
    text-align: center;
    color: #555;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="photo" src="cat-laying.jpeg" alt="Kot Alberta">
    <div class="content">
      <h1>Cześć, mam na imię Alberta 🐾</h1>
      <p class="subtitle">Jeśli mnie znalazłeś/aś z dala od domu, zadzwoń do moich opiekunów 🙏</p>
      <table>
        <tr><td class="label">Imię</td><td>Alberta</td></tr>
        <tr><td class="label">Rok urodzenia</td><td>2022</td></tr>
        <tr><td class="label">Umaszczenie</td><td>czarno-biała</td></tr>
        <tr><td class="label">Miasto</td><td>Katowice</td></tr>
      </table>
      <div class="call-buttons">
        <a class="call" href="tel:+48798687991">📞 Zadzwoń: 798 687 991</a>
        <a class="call" href="tel:+48515384304">📞 Zadzwoń: 515 384 304</a>
      </div>
      <p class="note">Dziękujemy za pomoc i odprowadzenie mnie do domu!</p>
    </div>
  </div>
</body>
</html>
